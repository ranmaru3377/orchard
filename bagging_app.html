<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梶原果樹園 袋かけ入力</title>
<style>
:root{--green:#2d5016;--green-mid:#5a8a3a;--green-pale:#eaf3e0;--border:#d5d5c8;--text:#333;--text-light:#888;--blue:#1565c0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f4f3ec;color:var(--text);padding-bottom:40px;}
header{background:var(--green);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;}
header h1{font-size:1.05rem;}
header .sub{font-size:0.72rem;opacity:0.85;margin-top:2px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:9;}
.tab-btn{flex:1;padding:11px 4px;border:none;background:none;font-size:0.82rem;color:var(--text-light);cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;}
.tab-btn.active{color:var(--green);font-weight:700;border-bottom-color:var(--green);}
.page{display:none;padding:14px;}
.page.active{display:block;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.card-title{font-size:0.85rem;font-weight:700;color:var(--green);margin-bottom:10px;}
.date-nav{display:flex;gap:8px;margin-bottom:12px;}
.date-nav input{flex:1;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;}
.btn-today{padding:9px 14px;border:1.5px solid var(--green-mid);background:#fff;color:var(--green);border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:inherit;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.opt{padding:8px 12px;border:1.5px solid var(--border);background:#fff;border-radius:20px;font-size:0.82rem;cursor:pointer;font-family:inherit;}
.opt.selected{background:var(--green-pale);border-color:var(--green-mid);color:var(--green);font-weight:600;}
label{font-size:0.74rem;color:var(--text-light);display:block;margin-bottom:4px;}
input[type=number],input[type=text],select{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.95rem;font-family:inherit;}
.row2{display:flex;gap:10px;}
.row2>div{flex:1;}
.count-row{display:flex;align-items:center;gap:8px;}
.count-btn{width:40px;height:40px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:1.3rem;cursor:pointer;flex-shrink:0;}
.count-input{flex:1;text-align:center;font-size:1.3rem;font-weight:600;}
.quick-add{display:flex;gap:6px;margin-top:8px;}
.quick-btn{flex:1;padding:6px;border:1.5px solid var(--green-mid);background:#fff;color:var(--green);border-radius:8px;font-size:0.78rem;cursor:pointer;font-family:inherit;}
.btn-save{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.save-msg{text-align:center;color:var(--green);font-weight:600;font-size:0.88rem;margin-top:10px;opacity:0;transition:0.3s;}
.save-msg.show{opacity:1;}
.sync-status{font-size:0.78rem;text-align:center;margin-top:8px;font-weight:500;min-height:1.2em;color:var(--blue);}
.cum-display{background:var(--green-pale);border-radius:10px;padding:10px;text-align:center;margin-top:10px;}
.cum-display .label{font-size:0.72rem;color:var(--text-light);}
.cum-display .value{font-size:1.4rem;font-weight:700;color:var(--green);}
.list-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.list-date{font-size:0.82rem;font-weight:700;color:var(--green);}
.list-detail{font-size:0.8rem;color:var(--text);margin-top:4px;}
.chip{display:inline-block;background:var(--green-pale);border-radius:6px;padding:2px 8px;font-size:0.74rem;margin:2px 3px 0 0;}
.empty{text-align:center;color:var(--text-light);padding:30px;font-size:0.88rem;}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:0.85rem;}
.summary-row .v{font-weight:600;color:var(--green);}
.note{font-size:0.72rem;color:var(--text-light);line-height:1.7;}
</style>
</head>
<body>
<header>
  <h1>🛍️ 梶原果樹園 袋かけ入力</h1>
  <div class="sub">荒尾市 ― 現場入力用</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showPage('input',event)">✏️ 入力</button>
  <button class="tab-btn" onclick="showPage('list',event)">📋 履歴</button>
  <button class="tab-btn" onclick="showPage('stock',event)">📦 残数</button>
  <button class="tab-btn" onclick="showPage('summary',event)">📊 集計</button>
</div>

<!-- 入力ページ -->
<div id="page-input" class="page active">
  <div class="date-nav">
    <input type="date" id="rec-date">
    <button class="btn-today" onclick="setToday()">今日</button>
  </div>

  <div class="card">
    <div class="card-title">🍐 品種</div>
    <div class="btn-group" id="variety-btns"></div>
  </div>

  <div class="card">
    <div class="card-title">🛍️ 袋種</div>
    <select id="bag-type" onchange="onBagTypeChange()">
      <option value="">選択してください</option>
    </select>
    <div id="bag-other-wrap" style="display:none;margin-top:8px;">
      <input type="text" id="bag-other" placeholder="袋種を入力（保存すると候補に追加されます）" style="font-size:0.85rem;">
    </div>
    <div style="margin-top:10px;text-align:right;">
      <span onclick="toggleBagManage()" style="font-size:0.78rem;color:var(--blue);cursor:pointer;">⚙ 袋種の追加・並べ替え・削除</span>
    </div>
    <div id="bag-manage" style="display:none;margin-top:8px;border-top:1px solid var(--border);padding-top:10px;">
      <div class="note" style="margin-bottom:6px;">▲▼で並べ替え、✕で削除（「その他」は常に最後）</div>
      <div id="bag-manage-list"></div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <input type="text" id="new-bag" placeholder="袋種を追加" style="font-size:0.85rem;">
        <button class="btn-today" onclick="addBag()">＋追加</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔢 袋かけ枚数</div>
    <div class="count-row">
      <button class="count-btn" onclick="addCount(-100)">－</button>
      <input type="number" id="count" class="count-input" placeholder="0" inputmode="numeric" oninput="updateCum()">
      <button class="count-btn" onclick="addCount(100)">＋</button>
    </div>
    <div class="quick-add">
      <button class="quick-btn" onclick="addCount(100)">+100</button>
      <button class="quick-btn" onclick="addCount(500)">+500</button>
      <button class="quick-btn" onclick="addCount(1000)">+1000</button>
    </div>
    <div class="cum-display">
      <div class="label">この品種の累計（今年度）</div>
      <div class="value" id="cum-value">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📍 園地・区画</div>
    <div class="row2">
      <div>
        <label>園地</label>
        <select id="field">
          <option value="">—</option>
          <option>長洲園</option><option>新図園畑</option>
          <option>新図園山</option><option>自宅園</option>
        </select>
      </div>
      <div>
        <label>区画（自宅園のみ）</label>
        <select id="block">
          <option value="">—</option>
          <option>二十世紀</option><option>中北</option>
          <option>中南</option><option>旧ハウス</option><option>若木</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👥 人数・時間</div>
    <div class="row2">
      <div>
        <label>作業人数</label>
        <input type="number" id="workers" placeholder="1" inputmode="numeric">
      </div>
      <div>
        <label>作業時間(h)</label>
        <input type="number" id="hours" step="0.5" placeholder="6" inputmode="decimal">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 備考</div>
    <input type="text" id="note" placeholder="例：中北エリア完了、明日続き">
  </div>

  <button class="btn-save" onclick="saveRecord()">💾 保存する</button>
  <div class="save-msg" id="save-msg">✅ 保存しました！</div>
  <div class="sync-status" id="sync-status"></div>
</div>

<!-- 履歴ページ -->
<div id="page-list" class="page">
  <div id="list-content"></div>
</div>

<!-- 残数ページ -->
<div id="page-stock" class="page">
  <div class="date-nav">
    <input type="date" id="stock-date">
    <button class="btn-today" onclick="stockToday()">今日</button>
  </div>
  <div class="card">
    <div class="card-title">📦 袋種ごとの残数を記録</div>
    <label>袋種</label>
    <select id="stock-bag"></select>
    <div style="margin-top:10px;">
      <label>残数（枚）</label>
      <div class="count-row">
        <button class="count-btn" onclick="stockAdjust(-100)">－</button>
        <input type="number" id="stock-count" class="count-input" placeholder="0" inputmode="numeric">
        <button class="count-btn" onclick="stockAdjust(100)">＋</button>
      </div>
      <div class="quick-add">
        <button class="quick-btn" onclick="stockAdjust(100)">+100</button>
        <button class="quick-btn" onclick="stockAdjust(500)">+500</button>
        <button class="quick-btn" onclick="stockAdjust(1000)">+1000</button>
      </div>
    </div>
    <button class="btn-save" style="margin-top:10px;" onclick="saveStock()">💾 残数を記録</button>
    <div class="save-msg" id="stock-msg">✅ 記録しました！</div>
  </div>
  <div class="card">
    <div class="card-title">📋 袋種別 最新残数</div>
    <div id="stock-latest"></div>
  </div>
  <div class="card">
    <div class="card-title">🕘 残数の記録履歴</div>
    <div id="stock-history"></div>
  </div>
</div>

<!-- 集計ページ -->
<div id="page-summary" class="page">
  <div class="card">
    <div class="card-title">📊 集計</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <input type="number" id="sum-year" inputmode="numeric" oninput="renderSummary()" style="width:96px;">
      <select id="sum-group" onchange="renderSummary()" style="flex:1;">
        <option value="variety">品種ごと</option>
        <option value="bagType">袋種ごと</option>
        <option value="field">園地ごと</option>
        <option value="block">区画ごと</option>
      </select>
    </div>
    <div id="summary-content"></div>
  </div>
  <div class="card">
    <div class="card-title">☁️ Googleスプレッドシート送信</div>
    <div class="note" style="margin-bottom:10px;">端末を替えてもデータが残るよう、Googleスプレッドシートに送信できます。</div>
    <button class="btn-save" style="font-size:0.88rem;padding:12px;" onclick="syncAll()">📤 全データを送信</button>
    <div class="sync-status" id="sync-status2"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'kajiwara_bagging_v1';
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// ▼▼▼ GASのURLを貼り付け（袋かけ用シートに送信） ▼▼▼
const GAS_URL = '';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const VARIETIES = ['愛甘水','甘ひびき','あきあかり','あきづき','豊水','南水','甘太','かおり','秋麗','新高','ヤーリー','その他'];
const DEFAULT_BAG_TYPES = ['17XL','W5XL','乳白特大止付','乳白特特大','乳白特特大止付','オレンジ','透明','S42BBXL','42XL','ZS特大','ZS特特大','ZS17','S42BB2L','517','その他'];
const BAG_KEY = 'kajiwara_bagging_bagtypes_v1';
let bagTypes = JSON.parse(localStorage.getItem(BAG_KEY) || 'null') || DEFAULT_BAG_TYPES.slice();
if(!bagTypes.includes('その他')) bagTypes.push('その他');
const STOCK_KEY = 'kajiwara_bagging_stock_v1';
let stockRecords = JSON.parse(localStorage.getItem(STOCK_KEY) || '[]');

// 「その他」を末尾に保ちつつ袋種を追加
function addBagTypeValue(name){
  if(!name || bagTypes.includes(name)) return false;
  const i=bagTypes.indexOf('その他');
  if(i>=0) bagTypes.splice(i,0,name); else bagTypes.push(name);
  localStorage.setItem(BAG_KEY, JSON.stringify(bagTypes));
  return true;
}
function populateBagSelects(){
  const bt=document.getElementById('bag-type');
  const cur=bt.value;
  bt.innerHTML='<option value="">選択してください</option>'+bagTypes.map(t=>`<option>${t}</option>`).join('');
  if(bagTypes.includes(cur)||cur==='') bt.value=cur;
  const sb=document.getElementById('stock-bag');
  if(sb){ const c2=sb.value; sb.innerHTML=bagTypes.filter(t=>t!=='その他').map(t=>`<option>${t}</option>`).join(''); if(bagTypes.includes(c2)) sb.value=c2; }
}
function onBagTypeChange(){
  document.getElementById('bag-other-wrap').style.display =
    (document.getElementById('bag-type').value==='その他') ? 'block' : 'none';
}

// 袋種の管理（追加・並べ替え・削除）
let bagManageOpen=false;
function toggleBagManage(){
  bagManageOpen=!bagManageOpen;
  document.getElementById('bag-manage').style.display=bagManageOpen?'block':'none';
  if(bagManageOpen) renderBagManage();
}
function workingBags(){ return bagTypes.filter(t=>t!=='その他'); }
function commitBags(list){
  bagTypes=[...list,'その他'];
  localStorage.setItem(BAG_KEY,JSON.stringify(bagTypes));
  populateBagSelects(); renderBagManage();
}
function renderBagManage(){
  const el=document.getElementById('bag-manage-list'); if(!el)return;
  const list=workingBags();
  const bs='width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;';
  el.innerHTML=list.map((w,i)=>`
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0;">
      <span style="flex:1;font-size:0.85rem;">${w}</span>
      <button onclick="moveBag(${i},-1)" ${i===0?'disabled':''} style="${bs}${i===0?'opacity:0.3;':''}">▲</button>
      <button onclick="moveBag(${i},1)" ${i===list.length-1?'disabled':''} style="${bs}${i===list.length-1?'opacity:0.3;':''}">▼</button>
      <button onclick="delBag(${i})" style="width:30px;height:30px;border:1px solid #f0c0c0;border-radius:6px;background:#fff;color:#c0392b;cursor:pointer;">✕</button>
    </div>`).join('');
}
function moveBag(i,dir){
  const list=workingBags(); const j=i+dir; if(j<0||j>=list.length)return;
  const t=list[i]; list[i]=list[j]; list[j]=t; commitBags(list);
}
function delBag(i){
  const list=workingBags(); const w=list[i];
  if(!confirm(`袋種候補「${w}」を削除しますか？\n（過去の記録は残ります）`))return;
  list.splice(i,1); commitBags(list);
}
function addBag(){
  const el=document.getElementById('new-bag'); const n=el.value.trim(); if(!n)return;
  if(bagTypes.includes(n)){alert('もうあります');return;}
  addBagTypeValue(n); el.value=''; populateBagSelects(); renderBagManage();
}

function init(){
  const vb = document.getElementById('variety-btns');
  VARIETIES.forEach(v=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=v;
    b.onclick=()=>{document.querySelectorAll('#variety-btns .opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');updateCum();};
    vb.appendChild(b);
  });
  populateBagSelects();
  setToday();
  stockToday();
  document.getElementById('sum-year').value=new Date().getFullYear();
}

function setToday(){document.getElementById('rec-date').value=new Date().toISOString().slice(0,10);}

function showPage(name,e){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  e.target.classList.add('active');
  if(name==='list')renderList();
  if(name==='summary')renderSummary();
  if(name==='stock'){ renderStockLatest(); renderStockHistory(); }
}

// ====== 残数（袋種ごと） ======
function stockToday(){document.getElementById('stock-date').value=new Date().toISOString().slice(0,10);}
function stockAdjust(n){
  const el=document.getElementById('stock-count');
  el.value=Math.max(0,(parseInt(el.value)||0)+n);
}
function saveStock(){
  const date=document.getElementById('stock-date').value;
  const bag=document.getElementById('stock-bag').value;
  const cnt=parseInt(document.getElementById('stock-count').value);
  if(!date){alert('日付を選んでください');return;}
  if(!bag){alert('袋種を選んでください');return;}
  if(isNaN(cnt)||cnt<0){alert('残数を入力してください');return;}
  const ex=stockRecords.find(s=>s.date===date&&s.bagType===bag);
  if(ex){ ex.remaining=cnt; } else { stockRecords.push({id:Date.now(),date,bagType:bag,remaining:cnt}); }
  localStorage.setItem(STOCK_KEY,JSON.stringify(stockRecords));
  const m=document.getElementById('stock-msg');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2000);
  document.getElementById('stock-count').value='';
  renderStockLatest(); renderStockHistory();
}
function delStock(id){
  if(!confirm('この残数記録を削除しますか？'))return;
  stockRecords=stockRecords.filter(s=>s.id!==id);
  localStorage.setItem(STOCK_KEY,JSON.stringify(stockRecords));
  renderStockLatest(); renderStockHistory();
}
function renderStockLatest(){
  const el=document.getElementById('stock-latest');
  if(!stockRecords.length){el.innerHTML='<div class="empty">まだ残数記録がありません</div>';return;}
  const byBag={};
  stockRecords.forEach(s=>{ (byBag[s.bagType]=byBag[s.bagType]||[]).push(s); });
  const rows=Object.keys(byBag).map(bag=>{
    const list=byBag[bag].slice().sort((a,b)=>a.date.localeCompare(b.date));
    const latest=list[list.length-1];
    const prev=list.length>1?list[list.length-2]:null;
    const used=prev?(prev.remaining-latest.remaining):null;
    return {bag,latest,used};
  }).sort((a,b)=>a.bag.localeCompare(b.bag));
  el.innerHTML=rows.map(r=>{
    const[,m,d]=r.latest.date.split('-');
    const usedStr=r.used!=null?`　前回比 ${r.used>=0?'−':'＋'}${Math.abs(r.used).toLocaleString()}枚`:'';
    return`<div class="summary-row">
      <div><div style="font-weight:600">${r.bag}</div><div style="font-size:0.72rem;color:var(--text-light)">${+m}/${+d}時点${usedStr}</div></div>
      <span class="v">残 ${r.latest.remaining.toLocaleString()}枚</span>
    </div>`;
  }).join('');
}
function renderStockHistory(){
  const el=document.getElementById('stock-history');
  if(!stockRecords.length){el.innerHTML='<div class="empty">記録なし</div>';return;}
  const sorted=[...stockRecords].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  el.innerHTML=sorted.map(s=>{
    const[y,m,d]=s.date.split('-');
    return`<div class="summary-row">
      <div><span style="font-size:0.8rem;color:var(--green);font-weight:600">${y}/${+m}/${+d}</span>　<span>${s.bagType}</span></div>
      <div><span class="v">${s.remaining.toLocaleString()}枚</span> <span style="color:#ccc;cursor:pointer;margin-left:8px" onclick="delStock(${s.id})">✕</span></div>
    </div>`;
  }).join('');
}

function addCount(n){
  const el=document.getElementById('count');
  el.value=Math.max(0,(parseInt(el.value)||0)+n);
  updateCum();
}

function getSelectedVariety(){
  const el=document.querySelector('#variety-btns .opt.selected');
  return el?el.textContent:'';
}

function currentYear(){return new Date(document.getElementById('rec-date').value||Date.now()).getFullYear();}

function updateCum(){
  const v=getSelectedVariety();
  const el=document.getElementById('cum-value');
  if(!v){el.textContent='—';return;}
  const yr=currentYear();
  const now=parseInt(document.getElementById('count').value)||0;
  const past=records.filter(r=>r.variety===v && new Date(r.date).getFullYear()===yr).reduce((s,r)=>s+(r.count||0),0);
  el.textContent=(past+now).toLocaleString()+' 枚';
}

function saveRecord(){
  const date=document.getElementById('rec-date').value;
  const variety=getSelectedVariety();
  const count=parseInt(document.getElementById('count').value)||0;
  if(!date){alert('日付を選んでください');return;}
  if(!variety){alert('品種を選んでください');return;}
  if(count<=0){alert('枚数を入力してください');return;}
  // 袋種：その他なら自由入力を使い、候補に追加
  let bag=document.getElementById('bag-type').value;
  if(bag==='その他'){
    bag=document.getElementById('bag-other').value.trim();
    if(!bag){alert('袋種を入力してください');return;}
    if(addBagTypeValue(bag)){ populateBagSelects(); }
  }
  const rec={
    id:Date.now(),date,variety,count,
    bagType:bag,
    field:document.getElementById('field').value,
    block:document.getElementById('block').value,
    workers:document.getElementById('workers').value,
    hours:document.getElementById('hours').value,
    note:document.getElementById('note').value.trim()
  };
  records.push(rec);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  syncOne(rec);
  const m=document.getElementById('save-msg');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2500);
  // リセット（品種と園地は残す＝連続入力しやすく）
  document.getElementById('count').value='';
  document.getElementById('note').value='';
  document.getElementById('bag-other').value='';
  document.getElementById('bag-other-wrap').style.display='none';
  if(document.getElementById('bag-type').value==='その他') document.getElementById('bag-type').value=bag;
  updateCum();
}

async function syncOne(rec){
  if(!GAS_URL){setSync('sync-status','💾 端末に保存しました（シート未連携）');return;}
  setSync('sync-status','📤 送信中...');
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sheet:'袋かけ',...rec})});
    setSync('sync-status','✅ シートに送信しました');
  }catch(e){setSync('sync-status','⚠️ 送信失敗（端末には保存済）');}
}

async function syncAll(){
  if(!GAS_URL){alert('GAS_URLが設定されていません');return;}
  if(records.length===0){alert('送信するデータがありません');return;}
  setSync('sync-status2','📤 '+records.length+'件送信中...');
  let ok=0;
  for(const rec of records){
    try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheet:'袋かけ',...rec})});ok++;await new Promise(r=>setTimeout(r,100));}catch(e){}
  }
  setSync('sync-status2','✅ '+ok+'件送信完了');
}

function setSync(id,msg){const el=document.getElementById(id);if(el)el.textContent=msg;}

function renderList(){
  const el=document.getElementById('list-content');
  if(records.length===0){el.innerHTML='<div class="empty">📭 まだ記録がありません</div>';return;}
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  el.innerHTML=sorted.map(r=>{
    const[y,m,d]=r.date.split('-');
    let chips='';
    if(r.bagType)chips+=`<span class="chip">${r.bagType}</span>`;
    if(r.field)chips+=`<span class="chip">${r.field}</span>`;
    if(r.block)chips+=`<span class="chip">${r.block}</span>`;
    if(r.workers)chips+=`<span class="chip">👥${r.workers}人</span>`;
    if(r.hours)chips+=`<span class="chip">⏱️${r.hours}h</span>`;
    return`<div class="list-item">
      <div class="list-date">${y}年${+m}月${+d}日　${r.variety}　<span style="color:#1565c0">${r.count.toLocaleString()}枚</span>
        <span style="float:right;color:#ccc;cursor:pointer" onclick="delRec(${r.id})">✕</span></div>
      <div class="list-detail">${chips}</div>
      ${r.note?`<div class="list-detail" style="color:#888">📝${r.note}</div>`:''}
    </div>`;
  }).join('');
}

function delRec(id){
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==id);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  renderList();
}

function renderSummary(){
  const yr=parseInt(document.getElementById('sum-year').value)||new Date().getFullYear();
  const group=document.getElementById('sum-group').value||'variety';
  const el=document.getElementById('summary-content');
  const filtered=records.filter(r=>new Date(r.date).getFullYear()===yr);
  if(!filtered.length){el.innerHTML='<div class="empty">この年度の記録はありません</div>';return;}
  const labelMap={variety:'品種',bagType:'袋種',field:'園地',block:'区画'};
  const map={}; let total=0;
  filtered.forEach(r=>{
    let key=r[group];
    if(!key||key==='') key='(未設定)';
    map[key]=(map[key]||0)+(r.count||0);
    total+=(r.count||0);
  });
  const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  el.innerHTML=`<div class="note" style="margin-bottom:8px;">${yr}年・${labelMap[group]}ごとの袋かけ枚数</div>`+
    arr.map(([k,v])=>`<div class="summary-row"><span>${k}</span><span class="v">${v.toLocaleString()}枚</span></div>`).join('')+
    `<div class="summary-row" style="border-top:2px solid var(--green);margin-top:4px"><span style="font-weight:700">合計</span><span class="v" style="font-size:1.1rem">${total.toLocaleString()}枚</span></div>`;
}

init();
</script>
