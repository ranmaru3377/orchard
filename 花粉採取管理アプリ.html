<!DOCTYPE html>
<html lang="ja">
<head>
<script>
/* 自動更新チェック：最新版があれば自動で読み込み直す */

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梶原果樹園 花粉採取管理</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAlRsl5eY2sI2kCrliwSK3H36cx8oWYKHA",
  authDomain: "kajiwara-orchard.firebaseapp.com",
  databaseURL: "https://kajiwara-orchard-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kajiwara-orchard",
  storageBucket: "kajiwara-orchard.firebasestorage.app",
  messagingSenderId: "1029372905399",
  appId: "1:1029372905399:web:e8bc3efe1c2fdac4688a32"
};
const FIREBASE_PATH = "kajiwara_pollen";
</script>
<style>
:root{--green:#2d5016;--green-mid:#5a8a3a;--green-pale:#eaf3e0;--border:#d5d5c8;--text:#333;--text-light:#888;--blue:#1565c0;--pink:#c2185b;--pink-pale:#fce4ec;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f4f3ec;color:var(--text);padding-bottom:40px;}
header{background:var(--green);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;}
header h1{font-size:1.05rem;}
header .sub{font-size:0.72rem;opacity:0.85;margin-top:2px;}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:54px;z-index:9;}
.tab-btn{flex:1;padding:11px 4px;border:none;background:none;font-size:0.82rem;color:var(--text-light);cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;}
.tab-btn.active{color:var(--green);font-weight:700;border-bottom-color:var(--green);}
.page{display:none;padding:14px;}
.page.active{display:block;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.card-title{font-size:0.85rem;font-weight:700;color:var(--green);margin-bottom:10px;}
.date-nav{display:flex;gap:8px;margin-bottom:12px;}
.date-nav input{flex:1;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;}
.btn-today{padding:9px 14px;border:1.5px solid var(--green-mid);background:#fff;color:var(--green);border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:inherit;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.opt{padding:9px 13px;border:1.5px solid var(--border);background:#fff;border-radius:20px;font-size:0.85rem;cursor:pointer;font-family:inherit;}
.opt.selected{background:var(--green-pale);border-color:var(--green-mid);color:var(--green);font-weight:600;}
.mode-toggle{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:13px;border:2px solid var(--border);background:#fff;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text-light);}
.mode-btn.active.collect{background:var(--green-pale);border-color:var(--green-mid);color:var(--green);}
.mode-btn.active.use{background:var(--pink-pale);border-color:var(--pink);color:var(--pink);}
label{font-size:0.74rem;color:var(--text-light);display:block;margin-bottom:4px;}
input[type=number],input[type=text]{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.95rem;font-family:inherit;}
.count-row{display:flex;align-items:center;gap:8px;}
.count-btn{width:44px;height:44px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:1.3rem;cursor:pointer;flex-shrink:0;}
.count-input{flex:1;text-align:center;font-size:1.3rem;font-weight:600;}
.quick-add{display:flex;gap:6px;margin-top:8px;}
.quick-btn{flex:1;padding:6px;border:1.5px solid var(--green-mid);background:#fff;color:var(--green);border-radius:8px;font-size:0.78rem;cursor:pointer;font-family:inherit;}
.btn-save{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-save.use-mode{background:var(--pink);}
.save-msg{text-align:center;color:var(--green);font-weight:600;font-size:0.88rem;margin-top:10px;opacity:0;transition:0.3s;}
.save-msg.show{opacity:1;}
.sync-status{font-size:0.78rem;text-align:center;margin-top:8px;font-weight:500;min-height:1.2em;color:var(--blue);}
.stock-card{background:var(--green-pale);border-radius:10px;padding:12px;margin-top:10px;}
.stock-row{display:flex;justify-content:space-between;font-size:0.85rem;padding:4px 0;}
.stock-row .v{font-weight:700;color:var(--green);}
.list-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.list-item.use{border-left:4px solid var(--pink);}
.list-item.collect{border-left:4px solid var(--green-mid);}
.list-date{font-size:0.82rem;font-weight:700;color:var(--green);}
.list-detail{font-size:0.8rem;color:var(--text);margin-top:4px;}
.chip{display:inline-block;background:var(--green-pale);border-radius:6px;padding:2px 8px;font-size:0.74rem;margin:2px 3px 0 0;}
.empty{text-align:center;color:var(--text-light);padding:30px;font-size:0.88rem;}
.stock-big{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #eee;}
.stock-big .name{font-weight:600;font-size:0.95rem;}
.stock-big .detail{font-size:0.74rem;color:var(--text-light);margin-top:2px;}
.stock-big .num{font-size:1.3rem;font-weight:700;color:var(--green);}
.stock-big .num.low{color:var(--pink);}
.note{font-size:0.72rem;color:var(--text-light);line-height:1.7;}
</style>
</head>
<body>
<header>
  <h1>🌸 梶原果樹園 花粉採取管理 <span id="sync-dot" style="font-size:0.62rem;padding:3px 9px;border-radius:14px;background:#888;color:#fff;font-weight:700;white-space:nowrap;vertical-align:middle;">接続中…</span></h1>
  <div class="sub">荒尾市 ― 採花・在庫管理（枚数）</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showPage('input',event)">✏️ 入力</button>
  <button class="tab-btn" onclick="showPage('stock',event)">📦 在庫</button>
  <button class="tab-btn" onclick="showPage('list',event)">📋 履歴</button>
</div>

<!-- 入力ページ -->
<div id="page-input" class="page active">
  <div class="mode-toggle">
    <button class="mode-btn collect active" id="mode-collect" onclick="setMode('collect')">🌸 採取</button>
    <button class="mode-btn use" id="mode-use" onclick="setMode('use')">🖌️ 使用（授粉）</button>
  </div>

  <div class="date-nav">
    <input type="date" id="rec-date">
    <button class="btn-today" onclick="setToday()">今日</button>
  </div>

  <div class="card">
    <div class="card-title">🌳 花粉樹の種類</div>
    <div class="btn-group" id="tree-btns"></div>
  </div>

  <div class="card">
    <div class="card-title" id="count-title">🌸 採取枚数</div>
    <div class="count-row">
      <button class="count-btn" onclick="addCount(-1)">－</button>
      <input type="number" id="count" class="count-input" placeholder="0" inputmode="numeric" oninput="updateStockPreview()">
      <button class="count-btn" onclick="addCount(1)">＋</button>
    </div>
    <div class="quick-add">
      <button class="quick-btn" onclick="addCount(5)">+5</button>
      <button class="quick-btn" onclick="addCount(10)">+10</button>
      <button class="quick-btn" onclick="addCount(30)">+30</button>
    </div>
    <div class="stock-card">
      <div class="stock-row"><span id="preview-label">現在の在庫</span><span class="v" id="preview-stock">—</span></div>
      <div class="stock-row"><span id="preview-after-label">この記録の後</span><span class="v" id="preview-after">—</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👥 作業人数・時間</div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">
        <label>作業人数</label>
        <input type="number" id="workers" placeholder="1" inputmode="numeric">
      </div>
      <div style="flex:1;">
        <label>作業時間(h)</label>
        <input type="number" id="hours" step="0.5" placeholder="2" inputmode="decimal">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 備考</div>
    <input type="text" id="note" placeholder="例：午前中採取、天気良好">
  </div>

  <button class="btn-save" id="save-btn" onclick="saveRecord()">💾 保存する</button>
  <div class="save-msg" id="save-msg">✅ 保存しました！</div>
  <div class="sync-status" id="sync-status"></div>
</div>

<!-- 在庫ページ -->
<div id="page-stock" class="page">
  <div class="card">
    <div class="card-title">📅 対象年度</div>
    <input type="number" id="stock-year" inputmode="numeric">
  </div>
  <div class="card">
    <div class="card-title">📦 花粉樹別 在庫（枚数）</div>
    <div id="stock-content"></div>
  </div>
  <div class="card">
    <div class="card-title">☁️ 家族で共有（クラウド同期）</div>
    <div class="note" style="margin-bottom:10px;">入力したデータは自動でクラウド保存され、家族の端末・PC・iPhoneすべてで同じ最新データが見られます。<br><b>この端末のデータを「基準」にしたいとき</b>だけ、下のボタンを押してクラウドへ上書きしてください（最初の1回だけでOK）。</div>
    <button class="btn-save" style="font-size:0.88rem;padding:12px;background:#c75b00;" onclick="forceUploadLocal()">📥 この端末のデータを基準にする（クラウドへ上書き）</button>
    <div class="sync-status" id="sync-status2"></div>
  </div>
</div>

<!-- 履歴ページ -->
<div id="page-list" class="page">
  <div id="list-content"></div>
</div>

<script>
const STORAGE_KEY='kajiwara_pollen_v1';
let records=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');

// ▼▼▼ GASのURLを貼り付け（花粉シートに送信） ▼▼▼
const GAS_URL='';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

const TREES=['馬次郎(ハウス)','馬次郎(路地)','ヤーリー','ネパール'];
let mode='collect';
let selTree='';

function init(){
  const tb=document.getElementById('tree-btns');
  TREES.forEach(t=>{
    const b=document.createElement('button');b.className='opt';b.textContent=t;
    b.onclick=()=>{document.querySelectorAll('#tree-btns .opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selTree=t;updateStockPreview();};
    tb.appendChild(b);
  });
  setToday();
  document.getElementById('stock-year').value=new Date().getFullYear();
  updateStockPreview();
}

function setMode(m){
  mode=m;
  document.getElementById('mode-collect').classList.toggle('active',m==='collect');
  document.getElementById('mode-use').classList.toggle('active',m==='use');
  document.getElementById('count-title').textContent=m==='collect'?'🌸 採取枚数':'🖌️ 使用枚数';
  document.getElementById('save-btn').classList.toggle('use-mode',m==='use');
  updateStockPreview();
}

function setToday(){document.getElementById('rec-date').value=new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,10);}

function showPage(name,e){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  e.target.classList.add('active');
  if(name==='list')renderList();
  if(name==='stock')renderStock();
}

function addCount(n){
  const el=document.getElementById('count');
  el.value=Math.max(0,(parseInt(el.value)||0)+n);
  updateStockPreview();
}

function currentYear(){return new Date(document.getElementById('rec-date').value||Date.now()).getFullYear();}

function getStock(tree,year){
  const collected=records.filter(r=>r.tree===tree&&r.type==='collect'&&new Date(r.date).getFullYear()===year).reduce((s,r)=>s+(r.count||0),0);
  const used=records.filter(r=>r.tree===tree&&r.type==='use'&&new Date(r.date).getFullYear()===year).reduce((s,r)=>s+(r.count||0),0);
  return {collected,used,stock:collected-used};
}

function updateStockPreview(){
  const lbl=document.getElementById('preview-label');
  const after=document.getElementById('preview-after');
  const afterLbl=document.getElementById('preview-after-label');
  if(!selTree){
    document.getElementById('preview-stock').textContent='樹を選択';
    after.textContent='—';
    return;
  }
  const yr=currentYear();
  const {stock}=getStock(selTree,yr);
  document.getElementById('preview-stock').textContent=stock.toLocaleString()+' 枚';
  const now=parseInt(document.getElementById('count').value)||0;
  const next=mode==='collect'?stock+now:stock-now;
  afterLbl.textContent=mode==='collect'?'採取後の在庫':'使用後の在庫';
  after.textContent=next.toLocaleString()+' 枚';
}

function saveRecord(){
  const date=document.getElementById('rec-date').value;
  const count=parseInt(document.getElementById('count').value)||0;
  if(!date){alert('日付を選んでください');return;}
  if(!selTree){alert('花粉樹を選んでください');return;}
  if(count<=0){alert('枚数を入力してください');return;}
  if(mode==='use'){
    const yr=currentYear();
    const {stock}=getStock(selTree,yr);
    if(count>stock){
      if(!confirm(`在庫(${stock}枚)より多い使用量です。\nこのまま記録しますか？`))return;
    }
  }
  const rec={id:Date.now(),date,tree:selTree,type:mode,count,
    workers:document.getElementById('workers').value,
    hours:document.getElementById('hours').value,
    note:document.getElementById('note').value.trim()};
  records.push(rec);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  syncOne(rec);
  const m=document.getElementById('save-msg');m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2500);
  document.getElementById('count').value='';
  document.getElementById('note').value='';
  document.getElementById('workers').value='';
  document.getElementById('hours').value='';
  updateStockPreview();
}

async function syncOne(rec){
  if(!GAS_URL){setSync('sync-status',(typeof SYNC!=='undefined'&&SYNC.cloudInit)?'☁️ 保存しました（家族と共有）':'💾 保存しました（共有は「基準にする」を一度実行）');return;}
  setSync('sync-status','📤 送信中...');
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheet:'花粉',...rec})});
    setSync('sync-status','✅ シートに送信しました');
  }catch(e){setSync('sync-status','⚠️ 送信失敗（端末には保存済）');}
}

async function syncAll(){
  if(!GAS_URL){alert('GAS_URLが設定されていません');return;}
  if(records.length===0){alert('送信するデータがありません');return;}
  setSync('sync-status2','📤 '+records.length+'件送信中...');
  let ok=0;
  for(const rec of records){
    try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheet:'花粉',...rec})});ok++;await new Promise(r=>setTimeout(r,100));}catch(e){}
  }
  setSync('sync-status2','✅ '+ok+'件送信完了');
}

function setSync(id,msg){const el=document.getElementById(id);if(el)el.textContent=msg;}

function renderStock(){
  const yr=parseInt(document.getElementById('stock-year').value)||new Date().getFullYear();
  const el=document.getElementById('stock-content');
  el.innerHTML=TREES.map(t=>{
    const {collected,used,stock}=getStock(t,yr);
    if(collected===0&&used===0)return '';
    return`<div class="stock-big">
      <div><div class="name">${t}</div><div class="detail">採取${collected.toLocaleString()}枚 − 使用${used.toLocaleString()}枚</div></div>
      <div class="num ${stock<0?'low':''}">${stock.toLocaleString()}枚</div>
    </div>`;
  }).join('')||'<div class="empty">この年度の記録はありません</div>';
}

function renderList(){
  const el=document.getElementById('list-content');
  if(records.length===0){el.innerHTML='<div class="empty">📭 まだ記録がありません</div>';return;}
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  el.innerHTML=sorted.map(r=>{
    const[y,m,d]=r.date.split('-');
    const isUse=r.type==='use';
    const label=isUse?'使用':'採取';
    const color=isUse?'#c2185b':'#1565c0';
    return`<div class="list-item ${r.type}">
      <div class="list-date">${y}年${+m}月${+d}日　${r.tree}
        <span style="float:right;color:#ccc;cursor:pointer" onclick="delRec(${r.id})">✕</span></div>
      <div class="list-detail"><span class="chip">${label}</span> <span style="color:${color};font-weight:700">${r.count.toLocaleString()}枚</span>${r.workers?` <span class="chip">👥${r.workers}人</span>`:''}${r.hours?` <span class="chip">⏱️${r.hours}h</span>`:''}</div>
      ${r.note?`<div class="list-detail" style="color:#888">📝${r.note}</div>`:''}
    </div>`;
  }).join('');
}

function delRec(id){
  if(!confirm('この記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==id);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(records));
  renderList();
}

document.addEventListener('DOMContentLoaded',()=>{
  const sy=document.getElementById('stock-year');
  if(sy)sy.addEventListener('input',renderStock);
  const rd=document.getElementById('rec-date');
  if(rd)rd.addEventListener('change',updateStockPreview);
});

// ===== Firebase 家族共有 同期 =====
const SYNC={ id:Math.random().toString(36).slice(2), applying:false, ready:false, cloudInit:false };
let dataRef=null, lastJSON=null, syncTimer=null;
function snapshotJSON(){ return JSON.stringify({ records }); }
function setSyncDot(t,c){ const el=document.getElementById('sync-dot'); if(el){ el.textContent=t; el.style.background=c; } }
function saveAllLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
function reRenderAll(){ ['renderList','renderSummary','renderStock','renderNameBtns','renderSelectedFerts','renderFertSuggest','renderUsage'].forEach(function(fn){ try{ if(typeof window[fn]==='function') window[fn](); }catch(e){} }); }
function pushIfChanged(){
  if(!SYNC.ready||SYNC.applying||!dataRef||!SYNC.cloudInit)return;
  const cur=snapshotJSON(); if(cur===lastJSON)return; lastJSON=cur;
  setSyncDot('保存中…','#e09020');
  dataRef.set({ records, writer:SYNC.id, updatedAt:Date.now() }).then(()=>setSyncDot('同期済 ✓','#3a8a2a')).catch(e=>{ setSyncDot('保存失敗','#c0392b'); console.error(e); lastJSON=null; });
}
function applyRemote(d){
  SYNC.applying=true;
  records=Array.isArray(d.records)?d.records:[];
  saveAllLocal();
  reRenderAll();
  lastJSON=snapshotJSON();
  SYNC.applying=false;
}
function forceUploadLocal(){
  if(!dataRef){ alert('まだ接続中です。数秒待って再度お試しください'); return; }
  if(!confirm('この端末のデータを「基準」としてクラウドに上書きします（クラウド上の他のデータは置き換わります）。よろしいですか？')) return;
  SYNC.ready=true; SYNC.cloudInit=true; lastJSON=null;
  dataRef.set({ records, writer:SYNC.id, updatedAt:Date.now() }).then(()=>{ lastJSON=snapshotJSON(); setSyncDot('同期済 ✓','#3a8a2a'); alert('✅ この端末のデータをクラウドに反映しました。以降は全端末で自動共有されます。'); }).catch(e=>{ alert('送信に失敗しました'); console.error(e); });
}
function initFirebase(){
  if(typeof firebase==='undefined'){ setSyncDot('SDK失敗','#c0392b'); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    dataRef=firebase.database().ref(FIREBASE_PATH);
    firebase.database().ref('.info/connected').on('value',s=>{ if(s.val()===true){ if(SYNC.ready) setSyncDot('同期済 ✓','#3a8a2a'); } else setSyncDot('オフライン','#888'); });
    dataRef.on('value',snap=>{
      const d=snap.val();
      if(!d){ SYNC.ready=true; SYNC.cloudInit=false; setSyncDot('未共有','#b0883a'); return; }
      SYNC.ready=true; SYNC.cloudInit=true;
      if(d.writer===SYNC.id){ setSyncDot('同期済 ✓','#3a8a2a'); return; }
      try{ applyRemote(d); }catch(e){ console.error(e); }
      setSyncDot('同期済 ✓','#3a8a2a');
    }, err=>{ setSyncDot('接続失敗','#c0392b'); console.error(err); });
  }catch(e){ setSyncDot('初期化失敗','#c0392b'); console.error(e); }
}
setInterval(pushIfChanged,2000);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') pushIfChanged(); });
window.addEventListener('pagehide',pushIfChanged);

init();
initFirebase();
</script>
</body>
</html>
